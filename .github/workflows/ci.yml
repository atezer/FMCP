name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    name: Build, type-check, lint, validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit -p tsconfig.local.json

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate Cursor skill figma_* refs vs registerTool
        run: npm run validate:fmcp-skills

      - name: Version consistency check
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VER"
          grep -q "version: \"$PKG_VER\"" src/local-plugin-only.ts || (echo "FAIL: local-plugin-only.ts version mismatch" && exit 1)
          grep -q "bridgeVersion: \"$PKG_VER\"" src/core/plugin-bridge-server.ts || (echo "FAIL: bridgeVersion mismatch" && exit 1)
          echo "All version strings match $PKG_VER"

      - name: Security audit
        run: npm audit --omit=dev || true
