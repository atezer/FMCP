<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: auto;
      height: auto;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      background: var(--figma-color-bg, #2c2c2c);
      color: var(--figma-color-text, rgba(255, 255, 255, 0.9));
      width: auto;
      height: auto;
      padding: 8px;
      user-select: none;
    }

    .bridge-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: max-content;
      max-width: 100%;
      min-height: 0;
      overflow: visible;
      padding-right: 2px;
    }

    .bridge-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: var(--figma-color-bg-secondary, #383838);
      border: 1px solid var(--figma-color-border, #4a4a4a);
      border-radius: 8px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-indicator.loading {
      background: #f5a623;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-indicator.active {
      background: #18a957;
      box-shadow: 0 0 6px rgba(24, 169, 87, 0.6);
      animation: glow 2s ease-in-out infinite;
    }

    .status-indicator.error {
      background: #f24822;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 4px rgba(24, 169, 87, 0.4); }
      50% { box-shadow: 0 0 8px rgba(24, 169, 87, 0.8); }
    }

    .status-text {
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .status-text .label {
      color: var(--figma-color-text-secondary, rgba(255, 255, 255, 0.7));
    }

    .status-text .state {
      color: var(--figma-color-text, rgba(255, 255, 255, 0.9));
      margin-left: 4px;
    }

    .advanced-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .advanced-toggle {
      border: 1px solid var(--figma-color-border, #4a4a4a);
      background: transparent;
      color: inherit;
      border-radius: 6px;
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
    }

    .advanced-state {
      font-size: 10px;
      color: var(--figma-color-text-secondary, rgba(255, 255, 255, 0.7));
    }

    .advanced-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 8px 10px;
      background: var(--figma-color-bg-secondary, #383838);
      border: 1px solid var(--figma-color-border, #4a4a4a);
      border-radius: 8px;
      overflow: hidden;
    }

    .advanced-panel.is-open {
      display: flex;
    }
    .bridge-host, .bridge-port {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
    }
    .bridge-host label, .bridge-port label {
      color: var(--figma-color-text-secondary, rgba(255, 255, 255, 0.7));
    }
    .bridge-host input {
      width: 90px;
      padding: 2px 4px;
      background: var(--figma-color-bg-tertiary, #1e1e1e);
      border: 1px solid var(--figma-color-border, #4a4a4a);
      border-radius: 3px;
      color: inherit;
      font-size: 11px;
    }
    .bridge-port input {
      width: 56px;
      padding: 2px 4px;
      background: var(--figma-color-bg-tertiary, #1e1e1e);
      border: 1px solid var(--figma-color-border, #4a4a4a);
      border-radius: 3px;
      color: inherit;
      font-size: 11px;
    }

    .auto-port-reset {
      align-self: flex-start;
      border: 1px solid var(--figma-color-border, #4a4a4a);
      background: transparent;
      color: inherit;
      border-radius: 6px;
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
    }

    .auto-port-reset:hover {
      opacity: 0.9;
    }

    /* Light theme support */
    @media (prefers-color-scheme: light) {
      body {
        background: #f5f5f5;
        color: #333;
      }
      .bridge-status {
        background: #fff;
        border-color: #e5e5e5;
      }
      .advanced-panel {
        background: #fff;
        border-color: #e5e5e5;
      }
      .status-text .label {
        color: #666;
      }
      .status-text .state {
        color: #333;
      }
    }
  </style>
</head>
<body>
  <div class="bridge-row">
    <div class="bridge-status" id="status-container" title="'no server': MCP bridge çalıştığından emin olun. Browser Figma'da da çalışır (aynı makinede localhost, uzakta IP girin).">
      <div class="status-indicator loading" id="status-dot"></div>
      <div class="status-text">
        <span class="label">MCP</span>
        <span class="state" id="status-state">connecting</span>
      </div>
    </div>
    <div class="advanced-wrap">
      <button id="advanced-toggle" class="advanced-toggle" type="button">Advanced</button>
      <span id="advanced-state" class="advanced-state">auto port</span>
    </div>
    <div id="advanced-panel" class="advanced-panel">
      <div class="bridge-host" title="Host: localhost (aynı makine) veya IP adresi (uzak makine). Browser Figma'da da çalışır.">
        <label for="mcp-host">Host</label>
        <input type="text" id="mcp-host" value="localhost" placeholder="localhost" aria-label="MCP bridge host (localhost veya IP)" />
      </div>
      <div class="bridge-port" title="Port elle belirtilmezse bridge'in dinlediği porta otomatik bağlanır (5454-5470 aralığı).">
        <label for="mcp-port">Port</label>
        <input type="number" id="mcp-port" min="5454" max="5470" value="5454" aria-label="MCP bridge port (auto fallback 5454-5470)" title="Elle değiştirirseniz tek porta kilitlenir; Otomatik tara veya Advanced'ı kapatın." />
      </div>
      <button type="button" id="auto-port-reset" class="auto-port-reset" title="Tek porta kilitlenmeyi kaldırır; 5454–5470 yeniden taranır (Claude config portu ile eşleşmeli)." aria-label="5454 ile 5470 arası otomatik port taraması">Otomatik tara</button>
      <div class="api-token-section" style="margin-top:8px;border-top:1px solid rgba(255,255,255,0.08);padding-top:8px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <label for="figma-token" style="font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap;">API Token</label>
          <input type="password" id="figma-token" placeholder="figd_..." style="flex:1;font-size:11px;padding:3px 6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#fff;outline:none;" aria-label="Figma REST API token" />
          <select id="token-expiry" style="font-size:10px;padding:2px 3px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:rgba(255,255,255,0.6);outline:none;" title="Token süresi (Figma'da seçtiğiniz süre)">
            <option value="90">90g</option>
            <option value="30">30g</option>
            <option value="7">7g</option>
            <option value="1">1g</option>
          </select>
          <button type="button" id="clear-token" style="font-size:10px;padding:2px 6px;background:rgba(255,100,100,0.15);border:1px solid rgba(255,100,100,0.2);border-radius:3px;color:rgba(255,100,100,0.8);cursor:pointer;" title="Token'ı temizle">x</button>
        </div>
        <div id="token-status" style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:3px;display:none;"></div>
        <div id="token-expiry-info" style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;display:none;"></div>
        <div id="token-expiry-note" style="font-size:8px;color:rgba(255,255,255,0.2);margin-top:1px;display:none;">Figma'daki token suresiyle eslestiginden emin olun</div>
        <div id="rate-limit-bar" style="display:none;margin-top:4px;">
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:9px;color:rgba(255,255,255,0.4);">
            <span style="display:flex;align-items:center;gap:3px;">API Limit <span id="rate-limit-info" onclick="var t=document.getElementById('rate-limit-tip');if(t)t.style.display=t.style.display==='block'?'none':'block';" style="cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:11px;height:11px;border-radius:50%;border:1px solid rgba(255,255,255,0.25);font-size:7px;color:rgba(255,255,255,0.4);user-select:none;">i</span></span>
            <span id="rate-limit-text">—</span>
          </div>
          <div id="rate-limit-tip" style="display:none;font-size:8px;color:rgba(255,255,255,0.35);margin-top:3px;padding:4px 6px;background:rgba(255,255,255,0.05);border-radius:3px;line-height:1.4;">Sadece REST API cagrilari limit tuketir. Plugin araclari (okuma, yazma, export) limit tuketmez.</div>
          <div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:2px;">
            <div id="rate-limit-fill" style="height:100%;background:#4ecdc4;border-radius:2px;transition:width 0.3s;width:100%;"></div>
          </div>
          <div id="rate-limit-note" style="font-size:8px;color:rgba(255,255,255,0.2);margin-top:2px;display:none;">REST API cagrisi sonrasi guncellenir</div>
          <div id="rate-limit-warning" style="display:none;font-size:9px;margin-top:2px;font-weight:600;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================================
    // GLOBAL STATE - Data storage for Puppeteer/MCP access
    // ============================================================================
    window.__figmaVariablesData = null;
    window.__figmaVariablesReady = false;
    window.__figmaComponentData = null;
    window.__figmaComponentRequests = new Map();
    window.__figmaPendingRequests = new Map();
    window.__figmaFileKey = null;
    window.__figmaFileName = null;

    let requestIdCounter = 0;

    // UI update helper
    function updateStatus(state, isActive, isError) {
      const dot = document.getElementById('status-dot');
      const stateText = document.getElementById('status-state');

      dot.className = 'status-indicator ' + (isError ? 'error' : (isActive ? 'active' : 'loading'));
      stateText.textContent = state;
      requestUiResize();
    }

    var resizeRaf = null;
    function requestUiResize() {
      if (resizeRaf) return;
      resizeRaf = requestAnimationFrame(function() {
        resizeRaf = null;
        var root = document.querySelector('.bridge-row') || document.body;
        if (!root) return;
        var rect = root.getBoundingClientRect();
        var bodyStyle = window.getComputedStyle(document.body);
        var padX = (parseFloat(bodyStyle.paddingLeft) || 0) + (parseFloat(bodyStyle.paddingRight) || 0);
        var padY = (parseFloat(bodyStyle.paddingTop) || 0) + (parseFloat(bodyStyle.paddingBottom) || 0);
        var width = Math.ceil(Math.max(root.scrollWidth, rect.width) + padX + 6);
        var height = Math.ceil(Math.max(root.scrollHeight, rect.height) + padY + 6);
        parent.postMessage({ pluginMessage: { type: 'RESIZE_UI', width: width, height: height } }, '*');
      });
    }

    // ============================================================================
    // COMMAND INFRASTRUCTURE - Generic plugin command sender
    // ============================================================================
    window.sendPluginCommand = (type, params, timeoutMs) => {
      timeoutMs = timeoutMs || 15000;
      return new Promise((resolve, reject) => {
        const requestId = type.toLowerCase() + '_' + (++requestIdCounter) + '_' + Date.now();

        const timeoutId = setTimeout(() => {
          if (window.__figmaPendingRequests.has(requestId)) {
            window.__figmaPendingRequests.delete(requestId);
            reject(new Error(type + ' request timed out after ' + timeoutMs + 'ms'));
          }
        }, timeoutMs);

        window.__figmaPendingRequests.set(requestId, { resolve: resolve, reject: reject, type: type, timeoutId: timeoutId });

        var message = { type: type, requestId: requestId };
        for (var key in params) {
          if (params.hasOwnProperty(key)) {
            message[key] = params[key];
          }
        }

        parent.postMessage({ pluginMessage: message }, '*');
        console.log('[F-MCP ATezer Bridge] Sent:', type);
      });
    };

    // ============================================================================
    // VARIABLE OPERATIONS
    // ============================================================================

    window.executeCode = (code, timeout) => {
      return window.sendPluginCommand('EXECUTE_CODE', { code: code, timeout: timeout || 5000 }, (timeout || 5000) + 2000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.updateVariable = (variableId, modeId, value) => {
      return window.sendPluginCommand('UPDATE_VARIABLE', { variableId: variableId, modeId: modeId, value: value })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.createVariable = (name, collectionId, resolvedType, options) => {
      var params = { name: name, collectionId: collectionId, resolvedType: resolvedType };
      if (options) {
        if (options.valuesByMode) params.valuesByMode = options.valuesByMode;
        if (options.description) params.description = options.description;
        if (options.scopes) params.scopes = options.scopes;
      }
      return window.sendPluginCommand('CREATE_VARIABLE', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.createVariableCollection = (name, options) => {
      var params = { name: name };
      if (options) {
        if (options.initialModeName) params.initialModeName = options.initialModeName;
        if (options.additionalModes) params.additionalModes = options.additionalModes;
      }
      return window.sendPluginCommand('CREATE_VARIABLE_COLLECTION', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.deleteVariable = (variableId) => {
      return window.sendPluginCommand('DELETE_VARIABLE', { variableId: variableId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.deleteVariableCollection = (collectionId) => {
      return window.sendPluginCommand('DELETE_VARIABLE_COLLECTION', { collectionId: collectionId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.renameVariable = (variableId, newName) => {
      return window.sendPluginCommand('RENAME_VARIABLE', { variableId: variableId, newName: newName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.addMode = (collectionId, modeName) => {
      return window.sendPluginCommand('ADD_MODE', { collectionId: collectionId, modeName: modeName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.renameMode = (collectionId, modeId, newName) => {
      return window.sendPluginCommand('RENAME_MODE', { collectionId: collectionId, modeId: modeId, newName: newName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.refreshVariables = () => {
      return window.sendPluginCommand('REFRESH_VARIABLES', {})
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // COMPONENT OPERATIONS
    // ============================================================================

    window.getLocalComponents = (currentPageOnly, limit) => {
      var params = {};
      params.currentPageOnly = currentPageOnly !== false;
      if (limit != null && limit > 0) params.limit = limit;
      return window.sendPluginCommand('GET_LOCAL_COMPONENTS', params, 120000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.searchLibraryAssets = (query, assetTypes, limit, currentPageOnly) => {
      var p = { query: query || '' };
      if (assetTypes && assetTypes.length) p.assetTypes = assetTypes;
      if (limit != null && limit > 0) p.limit = limit;
      if (currentPageOnly === false) p.currentPageOnly = false;
      return window.sendPluginCommand('SEARCH_LIBRARY_ASSETS', p, 120000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.getCodeConnectHints = (nodeIds, scanCurrentPage, maxNodes) => {
      var p = {};
      if (nodeIds && nodeIds.length) p.nodeIds = nodeIds;
      if (scanCurrentPage) p.scanCurrentPage = true;
      if (maxNodes != null && maxNodes > 0) p.maxNodes = maxNodes;
      return window.sendPluginCommand('GET_CODE_CONNECT_HINTS', p, 60000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.instantiateComponent = (componentKey, options) => {
      var params = { componentKey: componentKey };
      if (options) {
        if (options.nodeId) params.nodeId = options.nodeId;
        if (options.position) params.position = options.position;
        if (options.size) params.size = options.size;
        if (options.overrides) params.overrides = options.overrides;
        if (options.variant) params.variant = options.variant;
        if (options.parentId) params.parentId = options.parentId;
      }
      return window.sendPluginCommand('INSTANTIATE_COMPONENT', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    window.requestComponentData = (nodeId) => {
      return new Promise((resolve, reject) => {
        const requestId = 'component_' + (++requestIdCounter) + '_' + Date.now();
        window.__figmaComponentRequests.set(requestId, { resolve: resolve, reject: reject });
        parent.postMessage({ pluginMessage: { type: 'GET_COMPONENT', requestId: requestId, nodeId: nodeId } }, '*');
        setTimeout(() => {
          if (window.__figmaComponentRequests.has(requestId)) {
            window.__figmaComponentRequests.delete(requestId);
            reject(new Error('Component request timed out'));
          }
        }, 10000);
      });
    };

    // ============================================================================
    // NEW: COMPONENT PROPERTY MANAGEMENT
    // ============================================================================

    // Set component/node description
    window.setNodeDescription = (nodeId, description, descriptionMarkdown) => {
      return window.sendPluginCommand('SET_NODE_DESCRIPTION', {
        nodeId: nodeId,
        description: description,
        descriptionMarkdown: descriptionMarkdown
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Add a component property (BOOLEAN, TEXT, INSTANCE_SWAP, VARIANT)
    // Note: We use 'propertyType' instead of 'type' to avoid collision with message type field
    window.addComponentProperty = (nodeId, propertyName, type, defaultValue, options) => {
      var params = { nodeId: nodeId, propertyName: propertyName, propertyType: type, defaultValue: defaultValue };
      if (options) {
        if (options.preferredValues) params.preferredValues = options.preferredValues;
      }
      return window.sendPluginCommand('ADD_COMPONENT_PROPERTY', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Edit an existing component property
    window.editComponentProperty = (nodeId, propertyName, newValue) => {
      return window.sendPluginCommand('EDIT_COMPONENT_PROPERTY', {
        nodeId: nodeId,
        propertyName: propertyName,
        newValue: newValue
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Delete a component property
    window.deleteComponentProperty = (nodeId, propertyName) => {
      return window.sendPluginCommand('DELETE_COMPONENT_PROPERTY', {
        nodeId: nodeId,
        propertyName: propertyName
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // NEW: NODE MANIPULATION
    // ============================================================================

    // Resize any node
    window.resizeNode = (nodeId, width, height, withConstraints) => {
      return window.sendPluginCommand('RESIZE_NODE', {
        nodeId: nodeId,
        width: width,
        height: height,
        withConstraints: withConstraints !== false
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Move/position a node
    window.moveNode = (nodeId, x, y) => {
      return window.sendPluginCommand('MOVE_NODE', { nodeId: nodeId, x: x, y: y })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Set node fills (colors)
    window.setNodeFills = (nodeId, fills) => {
      return window.sendPluginCommand('SET_NODE_FILLS', { nodeId: nodeId, fills: fills })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Set node strokes
    window.setNodeStrokes = (nodeId, strokes, strokeWeight) => {
      var params = { nodeId: nodeId, strokes: strokes };
      if (strokeWeight !== undefined) params.strokeWeight = strokeWeight;
      return window.sendPluginCommand('SET_NODE_STROKES', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Set node opacity
    window.setNodeOpacity = (nodeId, opacity) => {
      return window.sendPluginCommand('SET_NODE_OPACITY', { nodeId: nodeId, opacity: opacity })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Set node corner radius
    window.setNodeCornerRadius = (nodeId, radius) => {
      return window.sendPluginCommand('SET_NODE_CORNER_RADIUS', { nodeId: nodeId, radius: radius })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Clone a node
    window.cloneNode = (nodeId) => {
      return window.sendPluginCommand('CLONE_NODE', { nodeId: nodeId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Delete a node
    window.deleteNode = (nodeId) => {
      return window.sendPluginCommand('DELETE_NODE', { nodeId: nodeId })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Rename a node
    window.renameNode = (nodeId, newName) => {
      return window.sendPluginCommand('RENAME_NODE', { nodeId: nodeId, newName: newName })
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Set text content (for text nodes)
    window.setTextContent = (nodeId, text, options) => {
      var params = { nodeId: nodeId, text: text };
      if (options) {
        if (options.fontSize) params.fontSize = options.fontSize;
        if (options.fontWeight) params.fontWeight = options.fontWeight;
        if (options.fontFamily) params.fontFamily = options.fontFamily;
      }
      return window.sendPluginCommand('SET_TEXT_CONTENT', params)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Create a new node as child
    window.createChildNode = (parentId, nodeType, properties) => {
      return window.sendPluginCommand('CREATE_CHILD_NODE', {
        parentId: parentId,
        nodeType: nodeType,
        properties: properties || {}
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // NEW: SCREENSHOT & INSTANCE PROPERTIES (Fix for visual validation loop)
    // ============================================================================

    // Capture screenshot using plugin's exportAsync (reads current plugin state, not cloud)
    // This solves the race condition where REST API screenshots show stale state
    window.captureScreenshot = (nodeId, options) => {
      var params = { nodeId: nodeId };
      if (options) {
        if (options.format) params.format = options.format;  // PNG, JPG, SVG
        if (options.scale) params.scale = options.scale;      // 1, 2, 4, etc.
      }
      return window.sendPluginCommand('CAPTURE_SCREENSHOT', params, 30000)
        .catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // Set component instance properties (TEXT, BOOLEAN, INSTANCE_SWAP, VARIANT)
    // This is the correct way to update component instances vs direct text node editing
    window.setInstanceProperties = (nodeId, properties) => {
      return window.sendPluginCommand('SET_INSTANCE_PROPERTIES', {
        nodeId: nodeId,
        properties: properties
      }).catch(function(err) { return { success: false, error: err.message || String(err) }; });
    };

    // ============================================================================
    // MESSAGE HANDLER - Process responses from plugin worker
    // ============================================================================
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      // Generic result handler
      const handleResult = (resultType, dataKey) => {
        const request = window.__figmaPendingRequests.get(msg.requestId);
        if (request) {
          if (request.timeoutId) clearTimeout(request.timeoutId);
          if (msg.success) {
            var result = { success: true };
            if (dataKey && msg[dataKey] !== undefined) result[dataKey] = msg[dataKey];
            if (msg.data !== undefined) result.data = msg.data;
            request.resolve(result);
          } else {
            request.resolve({ success: false, error: msg.error || 'Unknown error' });
          }
          window.__figmaPendingRequests.delete(msg.requestId);
        }
      };

      // Handle message types
      switch (msg.type) {
        case 'FILE_IDENTITY':
          window.__figmaFileKey = msg.fileKey || null;
          window.__figmaFileName = msg.fileName || null;
          console.log('[F-MCP ATezer Bridge] File identity: ' + (msg.fileName || '?') + ' (' + (msg.fileKey || '?') + ')');
          break;

        case 'RESTORE_TOKEN':
          // Token restored from figma.clientStorage on plugin open
          if (msg.token) {
            var tokenEl = document.getElementById('figma-token');
            if (tokenEl) tokenEl.value = msg.token;
            var expiresAt = msg.expiresAt || 0;
            __tokenExpiresAt = expiresAt;
            var isExpired = expiresAt > 0 && expiresAt < Date.now();
            if (isExpired) {
              updateTokenUI(false, null, expiresAt);
              // Auto-delete expired token
              parent.postMessage({ pluginMessage: { type: 'DELETE_TOKEN' } }, '*');
              if (tokenEl) tokenEl.value = '';
            } else {
              updateTokenUI(true, null, expiresAt);
              window.__pendingRestoreToken = msg.token;
            }
            console.log('[F-MCP] Token restored from clientStorage' + (isExpired ? ' (EXPIRED)' : '') + (expiresAt ? ' expires: ' + new Date(expiresAt).toLocaleDateString() : ''));
          }
          break;

        case 'TOKEN_SAVED':
          console.log('[F-MCP] Token saved to clientStorage: ' + (msg.success ? 'OK' : 'FAIL'));
          break;

        case 'TOKEN_DELETED':
          console.log('[F-MCP] Token deleted from clientStorage');
          break;

        case 'VARIABLES_DATA':
          window.__figmaVariablesData = msg.data;
          window.__figmaVariablesReady = true;
          if (mcpConnectedPort) {
            updateStatus('ready (:' + mcpConnectedPort + ')', true, false);
          } else {
            updateStatus('ready', true, false);
          }
          console.log('[F-MCP ATezer Bridge] Active - ' + (msg.data.variables?.length || 0) + ' vars');
          break;

        case 'COMPONENT_DATA':
          window.__figmaComponentData = msg.data;
          var req = window.__figmaComponentRequests.get(msg.requestId);
          if (req) { req.resolve(msg.data); window.__figmaComponentRequests.delete(msg.requestId); }
          break;

        case 'COMPONENT_ERROR':
          var req2 = window.__figmaComponentRequests.get(msg.requestId);
          if (req2) { req2.reject(new Error(msg.error)); window.__figmaComponentRequests.delete(msg.requestId); }
          break;

        case 'ERROR':
          window.__figmaVariablesReady = false;
          updateStatus('error', false, true);
          console.error('[F-MCP ATezer Bridge] Error:', msg.error);
          break;

        // Variable operations
        case 'EXECUTE_CODE_RESULT':
          handleResult('EXECUTE_CODE', 'result');
          break;
        case 'UPDATE_VARIABLE_RESULT':
          handleResult('UPDATE_VARIABLE', 'variable');
          break;
        case 'CREATE_VARIABLE_RESULT':
          handleResult('CREATE_VARIABLE', 'variable');
          break;
        case 'CREATE_VARIABLE_COLLECTION_RESULT':
          handleResult('CREATE_VARIABLE_COLLECTION', 'collection');
          break;
        case 'DELETE_VARIABLE_RESULT':
          handleResult('DELETE_VARIABLE', 'deleted');
          break;
        case 'DELETE_VARIABLE_COLLECTION_RESULT':
          handleResult('DELETE_VARIABLE_COLLECTION', 'deleted');
          break;
        case 'REFRESH_VARIABLES_RESULT':
          handleResult('REFRESH_VARIABLES', null);
          break;
        case 'RENAME_VARIABLE_RESULT':
          handleResult('RENAME_VARIABLE', 'variable');
          break;
        case 'ADD_MODE_RESULT':
          handleResult('ADD_MODE', 'collection');
          break;
        case 'RENAME_MODE_RESULT':
          handleResult('RENAME_MODE', 'collection');
          break;
        case 'GET_LOCAL_COMPONENTS_RESULT':
          handleResult('GET_LOCAL_COMPONENTS', null);
          break;
        case 'SEARCH_LIBRARY_ASSETS_RESULT':
          handleResult('SEARCH_LIBRARY_ASSETS', null);
          break;
        case 'GET_CODE_CONNECT_HINTS_RESULT':
          handleResult('GET_CODE_CONNECT_HINTS', null);
          break;
        case 'INSTANTIATE_COMPONENT_RESULT':
          handleResult('INSTANTIATE_COMPONENT', 'instance');
          break;

        // NEW: Component property operations
        case 'SET_NODE_DESCRIPTION_RESULT':
          handleResult('SET_NODE_DESCRIPTION', 'node');
          break;
        case 'ADD_COMPONENT_PROPERTY_RESULT':
          handleResult('ADD_COMPONENT_PROPERTY', 'propertyName');
          break;
        case 'EDIT_COMPONENT_PROPERTY_RESULT':
          handleResult('EDIT_COMPONENT_PROPERTY', 'propertyName');
          break;
        case 'DELETE_COMPONENT_PROPERTY_RESULT':
          handleResult('DELETE_COMPONENT_PROPERTY', null);
          break;

        // NEW: Node manipulation operations
        case 'RESIZE_NODE_RESULT':
          handleResult('RESIZE_NODE', 'node');
          break;
        case 'MOVE_NODE_RESULT':
          handleResult('MOVE_NODE', 'node');
          break;
        case 'SET_NODE_FILLS_RESULT':
          handleResult('SET_NODE_FILLS', 'node');
          break;
        case 'SET_NODE_STROKES_RESULT':
          handleResult('SET_NODE_STROKES', 'node');
          break;
        case 'SET_NODE_OPACITY_RESULT':
          handleResult('SET_NODE_OPACITY', 'node');
          break;
        case 'SET_NODE_CORNER_RADIUS_RESULT':
          handleResult('SET_NODE_CORNER_RADIUS', 'node');
          break;
        case 'CLONE_NODE_RESULT':
          handleResult('CLONE_NODE', 'node');
          break;
        case 'DELETE_NODE_RESULT':
          handleResult('DELETE_NODE', 'deleted');
          break;
        case 'RENAME_NODE_RESULT':
          handleResult('RENAME_NODE', 'node');
          break;
        case 'SET_TEXT_CONTENT_RESULT':
          handleResult('SET_TEXT_CONTENT', 'node');
          break;
        case 'CREATE_CHILD_NODE_RESULT':
          handleResult('CREATE_CHILD_NODE', 'node');
          break;

        // NEW: Screenshot and instance properties (visual validation loop fix)
        case 'CAPTURE_SCREENSHOT_RESULT':
          handleResult('CAPTURE_SCREENSHOT', 'image');
          break;
        case 'SET_INSTANCE_PROPERTIES_RESULT':
          handleResult('SET_INSTANCE_PROPERTIES', 'instance');
          break;
        case 'GET_DOCUMENT_STRUCTURE_RESULT':
          handleResult('GET_DOCUMENT_STRUCTURE', null);
          break;
        case 'GET_NODE_CONTEXT_RESULT':
          handleResult('GET_NODE_CONTEXT', null);
          break;
        case 'GET_LOCAL_STYLES_RESULT':
          handleResult('GET_LOCAL_STYLES', null);
          break;
        case 'CONSOLE_LOGS_RESULT':
          handleResult('GET_CONSOLE_LOGS', 'data');
          break;
        case 'CLEAR_CONSOLE_RESULT':
          handleResult('CLEAR_CONSOLE', null);
          break;
        case 'BATCH_CREATE_VARIABLES_RESULT':
          handleResult('BATCH_CREATE_VARIABLES', 'data');
          break;
        case 'BATCH_UPDATE_VARIABLES_RESULT':
          handleResult('BATCH_UPDATE_VARIABLES', 'data');
          break;
        case 'SETUP_DESIGN_TOKENS_RESULT':
          handleResult('SETUP_DESIGN_TOKENS', 'data');
          break;
        case 'ARRANGE_COMPONENT_SET_RESULT':
          handleResult('ARRANGE_COMPONENT_SET', 'data');
          break;
      }
    };

    window.getDocumentStructure = (depth, verbosity, includeLayout, includeVisual, includeTypography, includeCodeReady, outputHint) => {
      var payload = { depth: depth || 1, verbosity: verbosity || 'summary' };
      if (includeLayout !== undefined) payload.includeLayout = !!includeLayout;
      if (includeVisual !== undefined) payload.includeVisual = !!includeVisual;
      if (includeTypography !== undefined) payload.includeTypography = !!includeTypography;
      if (includeCodeReady !== undefined) payload.includeCodeReady = !!includeCodeReady;
      if (outputHint !== undefined && outputHint != null) payload.outputHint = outputHint;
      return window.sendPluginCommand('GET_DOCUMENT_STRUCTURE', payload, 90000).then(function(r) {
        if (r && r.success === false) return r;
        return r && r.data !== undefined ? r.data : r;
      });
    };
    window.getNodeContext = (nodeId, depth, verbosity, includeLayout, includeVisual, includeTypography, includeCodeReady, outputHint) => {
      var payload = { nodeId: nodeId, depth: depth || 2, verbosity: verbosity || 'standard' };
      if (includeLayout !== undefined) payload.includeLayout = !!includeLayout;
      if (includeVisual !== undefined) payload.includeVisual = !!includeVisual;
      if (includeTypography !== undefined) payload.includeTypography = !!includeTypography;
      if (includeCodeReady !== undefined) payload.includeCodeReady = !!includeCodeReady;
      if (outputHint !== undefined && outputHint != null) payload.outputHint = outputHint;
      return window.sendPluginCommand('GET_NODE_CONTEXT', payload, 90000).then(function(r) {
        if (r && r.success === false) return r;
        return r && r.data !== undefined ? r.data : r;
      });
    };
    window.getLocalStyles = (verbosity) => {
      return window.sendPluginCommand('GET_LOCAL_STYLES', { verbosity: verbosity || 'summary' }, 15000).then(function(r) { return r.data; });
    };
    window.getConsoleLogs = (limit) => {
      return window.sendPluginCommand('GET_CONSOLE_LOGS', { limit: limit || 50 }, 5000).then(function(r) {
        if (r && r.success === false) return r;
        return r && r.data ? r.data : { logs: [], total: 0 };
      });
    };
    window.clearConsole = () => {
      return window.sendPluginCommand('CLEAR_CONSOLE', {}, 3000).then(function(r) { return r || { success: true }; });
    };
    window.batchCreateVariables = (items) => {
      return window.sendPluginCommand('BATCH_CREATE_VARIABLES', { items: items || [] }, 60000).then(function(r) { return r && r.data ? r.data : r; });
    };
    window.batchUpdateVariables = (items) => {
      return window.sendPluginCommand('BATCH_UPDATE_VARIABLES', { items: items || [] }, 60000).then(function(r) { return r && r.data ? r.data : r; });
    };
    window.setupDesignTokens = (payload) => {
      return window.sendPluginCommand('SETUP_DESIGN_TOKENS', {
        collectionName: payload.collectionName,
        modes: payload.modes,
        tokens: payload.tokens
      }, 30000).then(function(r) { return r; });
    };
    window.arrangeComponentSet = (nodeIds) => {
      return window.sendPluginCommand('ARRANGE_COMPONENT_SET', { nodeIds: nodeIds || [] }, 15000).then(function(r) { return r && r.data ? r.data : r; });
    };

    // ============================================================================
    // MCP PLUGIN BRIDGE - WebSocket client (no Figma debug port needed)
    // Host + Port configurable: browser Figma ve uzak makine destegi
    // ============================================================================
    var MCP_BRIDGE_PORT_KEY = 'f-mcp-bridge-port';
    var MCP_BRIDGE_HOST_KEY = 'f-mcp-bridge-host';
    var MCP_ADVANCED_OPEN_KEY = 'f-mcp-bridge-advanced-open';

    var mcpBridgeWs = null;
    var mcpBridgeReconnectTimer = null;
    var mcpReconnectDelay = 1000;
    var MCP_RECONNECT_MIN = 1000;
    var MCP_RECONNECT_MAX = 30000;
    var mcpConnecting = false;
    var mcpConnectedPort = null;
    var MCP_PORT_MIN = 5454;
    var MCP_PORT_MAX = 5470;
    var DEFAULT_MCP_PORT = 5454;
    var autoPortProbeActive = false;
    var manualPortLocked = false;
    var candidatePorts = [];
    var candidatePortIndex = 0;

    /** Port alanı elle değiştirilince manualPortLocked=true olur; bu kilit 5454–5470 taramasını durdurur. */
    function unlockAutoPortScan() {
      manualPortLocked = false;
      forceDisconnectAndReconnect();
    }

    function setAdvancedPanelOpen(open, opts) {
      opts = opts || {};
      var panel = document.getElementById('advanced-panel');
      var state = document.getElementById('advanced-state');
      if (panel) {
        panel.classList.toggle('is-open', !!open);
      }
      if (state) {
        state.textContent = open ? 'manual controls' : 'auto port';
      }
      try { localStorage.setItem(MCP_ADVANCED_OPEN_KEY, open ? '1' : '0'); } catch (e) {}
      if (open) {
        var mainScroller = document.querySelector('.bridge-row');
        if (mainScroller && typeof mainScroller.scrollTop === 'number') {
          mainScroller.scrollTop = 0;
        }
      } else if (!opts.skipUnlock) {
        unlockAutoPortScan();
      }
      requestUiResize();
    }

    // ---- Token UI ----
    function updateTokenUI(hasToken, rateLimit, expiresAt) {
      var statusEl = document.getElementById('token-status');
      var barEl = document.getElementById('rate-limit-bar');
      var textEl = document.getElementById('rate-limit-text');
      var fillEl = document.getElementById('rate-limit-fill');
      var expiryEl = document.getElementById('token-expiry-info');
      if (statusEl) {
        statusEl.style.display = 'block';
        statusEl.textContent = hasToken ? 'Token aktif' : 'Token yok';
        statusEl.style.color = hasToken ? 'rgba(78,205,196,0.8)' : 'rgba(255,255,255,0.35)';
      }
      // Expiry countdown
      if (expiryEl) {
        if (hasToken && expiresAt && expiresAt > 0) {
          var now = Date.now();
          var daysLeft = Math.ceil((expiresAt - now) / (24 * 60 * 60 * 1000));
          if (daysLeft <= 0) {
            expiryEl.style.display = 'block';
            expiryEl.textContent = 'Token suresi dolmus!';
            expiryEl.style.color = 'rgba(249,65,68,0.9)';
            if (statusEl) { statusEl.textContent = 'Token suresi dolmus'; statusEl.style.color = 'rgba(249,65,68,0.8)'; }
          } else {
            expiryEl.style.display = 'block';
            var expDate = new Date(expiresAt);
            expiryEl.textContent = daysLeft + ' gun kaldi (' + expDate.toLocaleDateString('tr-TR') + ')';
            expiryEl.style.color = daysLeft <= 7 ? 'rgba(249,193,79,0.8)' : 'rgba(255,255,255,0.35)';
          }
        } else {
          expiryEl.style.display = 'none';
        }
      }
      // Rate limit bar
      if (rateLimit && rateLimit.limit > 0 && barEl && textEl && fillEl) {
        barEl.style.display = 'block';
        var pct = Math.round((rateLimit.remaining / rateLimit.limit) * 100);
        textEl.textContent = rateLimit.remaining + ' / ' + rateLimit.limit;
        fillEl.style.width = pct + '%';
        fillEl.style.background = pct > 30 ? '#4ecdc4' : pct > 10 ? '#f9c74f' : '#f94144';
        // Warning text
        var warnEl = document.getElementById('rate-limit-warning');
        if (warnEl) {
          if (rateLimit.remaining === 0) {
            warnEl.style.display = 'block';
            warnEl.textContent = 'API limiti doldu!';
            warnEl.style.color = '#f94144';
          } else if (pct <= 5) {
            warnEl.style.display = 'block';
            warnEl.textContent = 'API limiti kritik!';
            warnEl.style.color = '#f94144';
            fillEl.style.animation = 'pulse 1s infinite';
          } else if (pct <= 20) {
            warnEl.style.display = 'block';
            warnEl.textContent = 'Dusuk API limiti';
            warnEl.style.color = '#f9c74f';
            fillEl.style.animation = 'none';
          } else {
            warnEl.style.display = 'none';
            fillEl.style.animation = 'none';
          }
        }
        // Hide "no data" note when real data exists
        var noteEl = document.getElementById('rate-limit-note');
        if (noteEl) noteEl.style.display = 'none';
      } else if (barEl) {
        barEl.style.display = hasToken ? 'block' : 'none';
        if (textEl) textEl.textContent = '—';
        if (fillEl) { fillEl.style.width = '100%'; fillEl.style.animation = 'none'; }
        var warnEl2 = document.getElementById('rate-limit-warning');
        if (warnEl2) warnEl2.style.display = 'none';
        // Show "no data" note when token exists but no rate limit data
        var noteEl2 = document.getElementById('rate-limit-note');
        if (noteEl2) noteEl2.style.display = hasToken ? 'block' : 'none';
      }
      // Token expiry note
      var expiryNoteEl = document.getElementById('token-expiry-note');
      if (expiryNoteEl) expiryNoteEl.style.display = (hasToken && expiresAt > 0) ? 'block' : 'none';
      requestUiResize();
    }

    // Track current token expiry for UI updates
    var __tokenExpiresAt = 0;

    function getSelectedExpiryDays() {
      var sel = document.getElementById('token-expiry');
      return sel ? parseInt(sel.value, 10) || 90 : 90;
    }

    function initTokenInput() {
      var el = document.getElementById('figma-token');
      var clearBtn = document.getElementById('clear-token');
      if (el) {
        el.addEventListener('change', function() {
          var token = (el.value || '').trim();
          if (token) {
            var days = getSelectedExpiryDays();
            var expiresAt = Date.now() + days * 24 * 60 * 60 * 1000;
            __tokenExpiresAt = expiresAt;
            // Save to Figma clientStorage (persists across plugin close/reopen)
            parent.postMessage({ pluginMessage: { type: 'SAVE_TOKEN', token: token, expiresAt: expiresAt } }, '*');
            // Send to bridge
            if (mcpBridgeWs && mcpBridgeWs.readyState === 1) {
              mcpBridgeWs.send(JSON.stringify({ type: 'setToken', token: token }));
            }
            updateTokenUI(true, null, expiresAt);
          } else {
            updateTokenUI(false, null, 0);
          }
        });
      }
      if (clearBtn) {
        clearBtn.addEventListener('click', function() {
          if (el) el.value = '';
          __tokenExpiresAt = 0;
          // Delete from Figma clientStorage
          parent.postMessage({ pluginMessage: { type: 'DELETE_TOKEN' } }, '*');
          // Clear from bridge
          if (mcpBridgeWs && mcpBridgeWs.readyState === 1) {
            mcpBridgeWs.send(JSON.stringify({ type: 'clearToken' }));
          }
          updateTokenUI(false, null, 0);
        });
      }
    }

    function initAdvancedPanel() {
      var toggle = document.getElementById('advanced-toggle');
      var initial = false;
      try { initial = localStorage.getItem(MCP_ADVANCED_OPEN_KEY) === '1'; } catch (e) {}
      setAdvancedPanelOpen(initial, { skipUnlock: true });
      if (toggle) {
        toggle.addEventListener('click', function() {
          var panel = document.getElementById('advanced-panel');
          var willOpen = !(panel && panel.classList.contains('is-open'));
          setAdvancedPanelOpen(willOpen);
        });
      }
      var autoBtn = document.getElementById('auto-port-reset');
      if (autoBtn) {
        autoBtn.addEventListener('click', function() {
          unlockAutoPortScan();
        });
      }
      if (typeof ResizeObserver !== 'undefined') {
        var observer = new ResizeObserver(function() { requestUiResize(); });
        observer.observe(document.body);
        var row = document.querySelector('.bridge-row');
        if (row) observer.observe(row);
      }
    }

    function getMcpBridgeHost() {
      var el = document.getElementById('mcp-host');
      if (!el) return 'localhost';
      var v = (el.value || '').trim();
      return v || 'localhost';
    }

    function getMcpBridgePort() {
      var el = document.getElementById('mcp-port');
      if (!el) return DEFAULT_MCP_PORT;
      var n = parseInt(el.value, 10);
      if (isNaN(n) || n < MCP_PORT_MIN || n > MCP_PORT_MAX) return DEFAULT_MCP_PORT;
      return n;
    }

    function listCandidatePorts() {
      var set = {};
      var out = [];
      var manual = getMcpBridgePort();
      var push = function(n) {
        if (typeof n !== 'number' || isNaN(n)) return;
        if (n < MCP_PORT_MIN || n > MCP_PORT_MAX) return;
        if (set[n]) return;
        set[n] = true;
        out.push(n);
      };
      push(manual);
      push(DEFAULT_MCP_PORT);
      for (var p = MCP_PORT_MIN; p <= MCP_PORT_MAX; p++) push(p);
      return out;
    }

    function forceDisconnectAndReconnect() {
      if (mcpBridgeReconnectTimer) { clearTimeout(mcpBridgeReconnectTimer); mcpBridgeReconnectTimer = null; }
      mcpReconnectDelay = MCP_RECONNECT_MIN;
      candidatePorts = listCandidatePorts();
      candidatePortIndex = 0;
      mcpConnecting = false;
      if (mcpBridgeWs) {
        var old = mcpBridgeWs;
        mcpBridgeWs = null;
        old.onclose = null;
        old.onerror = null;
        old.onmessage = null;
        try { old.close(); } catch (_) {}
      }
      connectMcpBridge();
    }

    function initMcpHostInput() {
      try {
        var stored = localStorage.getItem(MCP_BRIDGE_HOST_KEY);
        if (stored) {
          var el = document.getElementById('mcp-host');
          if (el) { el.value = stored; }
        }
      } catch (e) {}
      var el = document.getElementById('mcp-host');
      if (el) {
        el.addEventListener('change', function() {
          var host = getMcpBridgeHost();
          try { localStorage.setItem(MCP_BRIDGE_HOST_KEY, host); } catch (e) {}
          forceDisconnectAndReconnect();
        });
      }
    }

    function initMcpPortInput() {
      try {
        var stored = localStorage.getItem(MCP_BRIDGE_PORT_KEY);
        if (stored) {
          var n = parseInt(stored, 10);
          if (n >= MCP_PORT_MIN && n <= MCP_PORT_MAX) {
            var el = document.getElementById('mcp-port');
            if (el) { el.value = n; }
          }
        }
      } catch (e) {}
      var el = document.getElementById('mcp-port');
      if (el) {
        el.addEventListener('change', function() {
          var port = getMcpBridgePort();
          try { localStorage.setItem(MCP_BRIDGE_PORT_KEY, String(port)); } catch (e) {}
          manualPortLocked = true;
          candidatePorts = [port];
          candidatePortIndex = 0;
          forceDisconnectAndReconnect();
        });
      }
    }

    var mcpHandshakeTimer = null;
    var mcpHandshakeDone = false;
    var mcpKeepAliveTimer = null;

    function scheduleReconnect() {
      if (mcpBridgeReconnectTimer) clearTimeout(mcpBridgeReconnectTimer);
      mcpBridgeReconnectTimer = setTimeout(function() {
        mcpBridgeReconnectTimer = null;
        connectMcpBridge();
      }, mcpReconnectDelay);
      mcpReconnectDelay = Math.min(mcpReconnectDelay * 2, MCP_RECONNECT_MAX);
    }

    function startKeepAlive(ws) {
      if (mcpKeepAliveTimer) { clearInterval(mcpKeepAliveTimer); mcpKeepAliveTimer = null; }
      mcpKeepAliveTimer = setInterval(function() {
        if (ws && ws.readyState === 1) {
          try { ws.send(JSON.stringify({ type: 'keepalive' })); } catch (_) {}
        } else {
          clearInterval(mcpKeepAliveTimer);
          mcpKeepAliveTimer = null;
        }
      }, 2000);
    }

    function stopKeepAlive() {
      if (mcpKeepAliveTimer) { clearInterval(mcpKeepAliveTimer); mcpKeepAliveTimer = null; }
    }

    function connectMcpBridge() {
      if (mcpConnecting) return;
      if (mcpBridgeWs && (mcpBridgeWs.readyState === 0 || mcpBridgeWs.readyState === 1)) return;
      mcpConnecting = true;
      var host = getMcpBridgeHost();
      if (!candidatePorts || !candidatePorts.length) {
        candidatePorts = listCandidatePorts();
        candidatePortIndex = 0;
      }
      var port = candidatePorts[Math.min(candidatePortIndex, candidatePorts.length - 1)];
      var url = 'ws://' + host + ':' + port;
      mcpHandshakeDone = false;
      autoPortProbeActive = !manualPortLocked && candidatePorts.length > 1;
      try {
        mcpBridgeWs = new WebSocket(url);
        var currentWs = mcpBridgeWs;
        mcpBridgeWs.onopen = function() {
          mcpConnecting = false;
          mcpReconnectDelay = MCP_RECONNECT_MIN;
          console.log('[F-MCP ATezer Bridge] WebSocket opened to ' + url + ', waiting for handshake...');
          updateStatus('connecting...', false, false);
          currentWs.send(JSON.stringify({
            type: 'ready',
            fileKey: window.__figmaFileKey || null,
            fileName: window.__figmaFileName || null
          }));
          startKeepAlive(currentWs);
          if (mcpHandshakeTimer) clearTimeout(mcpHandshakeTimer);
          mcpHandshakeTimer = setTimeout(function() {
            if (!mcpHandshakeDone && mcpBridgeWs === currentWs) {
              console.warn('[F-MCP ATezer Bridge] No welcome from server — wrong server or outdated bridge');
              updateStatus('wrong server', false, true);
            }
          }, 5000);
        };
        mcpBridgeWs.onmessage = function(event) {
          try {
            var msg = JSON.parse(event.data);
            if (msg.type === 'welcome') {
              mcpHandshakeDone = true;
              if (mcpHandshakeTimer) { clearTimeout(mcpHandshakeTimer); mcpHandshakeTimer = null; }
              mcpConnectedPort = msg.port || port;
              try { localStorage.setItem(MCP_BRIDGE_PORT_KEY, String(mcpConnectedPort)); } catch (e) {}
              var portEl = document.getElementById('mcp-port');
              if (portEl && mcpConnectedPort >= MCP_PORT_MIN && mcpConnectedPort <= MCP_PORT_MAX) {
                portEl.value = String(mcpConnectedPort);
              }
              if (!manualPortLocked) {
                candidatePorts = [mcpConnectedPort];
                candidatePortIndex = 0;
              }
              console.log('[F-MCP ATezer Bridge] Handshake OK — bridge v' + (msg.bridgeVersion || '?') + ' on port ' + mcpConnectedPort);
              updateStatus('ready (:' + mcpConnectedPort + ')', true, false);
              // Resend restored token to bridge after handshake
              if (window.__pendingRestoreToken && currentWs && currentWs.readyState === 1) {
                currentWs.send(JSON.stringify({ type: 'setToken', token: window.__pendingRestoreToken }));
                console.log('[F-MCP] Sent restored token to bridge');
              }
              // Also check input field (user may have entered token before connection)
              var tokenInput = document.getElementById('figma-token');
              if (!window.__pendingRestoreToken && tokenInput && tokenInput.value && currentWs && currentWs.readyState === 1) {
                currentWs.send(JSON.stringify({ type: 'setToken', token: tokenInput.value.trim() }));
              }
              return;
            }
            if (msg.type === 'tokenStatus') {
              updateTokenUI(msg.hasToken, msg.rateLimit || null, __tokenExpiresAt);
              return;
            }
            if (msg.type === 'ping') {
              if (mcpBridgeWs && mcpBridgeWs.readyState === 1) {
                mcpBridgeWs.send(JSON.stringify({ type: 'pong' }));
              }
              return;
            }
            if (!msg.id || !msg.method) return;
            var id = msg.id;
            var method = msg.method;
            var params = msg.params || {};
            var run = function() {
              if (method === 'getVariablesFromPluginUI') {
                // Always refresh first (async API) so variables work in dynamic-page context
                return window.refreshVariables().then(function(r) {
                  if (r && r.success === false) return { success: false, error: r.error || 'Variables refresh failed' };
                  if (!window.__figmaVariablesData) return { success: false, error: 'Variables not loaded' };
                  return { success: true, variables: window.__figmaVariablesData.variables, variableCollections: window.__figmaVariablesData.variableCollections };
                });
              }
              if (method === 'getComponentFromPluginUI') {
                return window.requestComponentData(params.nodeId).then(function(data) {
                  return { success: true, component: data };
                });
              }
              if (method === 'getComponentByNodeId') {
                return window.requestComponentData(params.nodeId).then(function(data) {
                  return { success: true, component: data };
                });
              }
              if (method === 'getVariables') {
                if (!window.__figmaVariablesReady || !window.__figmaVariablesData)
                  return { success: false, error: 'Variables not loaded yet' };
                return { success: true, timestamp: Date.now(), fileMetadata: {}, variables: window.__figmaVariablesData.variables, variableCollections: window.__figmaVariablesData.variableCollections };
              }
              if (method === 'executeCodeViaUI') {
                return window.executeCode(params.code, params.timeout);
              }
              if (method === 'updateVariable') {
                return window.updateVariable(params.variableId, params.modeId, params.value);
              }
              if (method === 'createVariable') {
                return window.createVariable(params.name, params.collectionId, params.resolvedType, params.options);
              }
              if (method === 'createVariableCollection') {
                return window.createVariableCollection(params.name, params.options);
              }
              if (method === 'deleteVariable') {
                return window.deleteVariable(params.variableId);
              }
              if (method === 'deleteVariableCollection') {
                return window.deleteVariableCollection(params.collectionId);
              }
              if (method === 'renameVariable') {
                return window.renameVariable(params.variableId, params.newName);
              }
              if (method === 'addMode') {
                return window.addMode(params.collectionId, params.modeName);
              }
              if (method === 'renameMode') {
                return window.renameMode(params.collectionId, params.modeId, params.newName);
              }
              if (method === 'refreshVariables') {
                return window.refreshVariables();
              }
              if (method === 'getLocalComponents') {
                return window.getLocalComponents(params.currentPageOnly, params.limit);
              }
              if (method === 'searchLibraryAssets') {
                return window.searchLibraryAssets(params.query, params.assetTypes, params.limit, params.currentPageOnly);
              }
              if (method === 'getCodeConnectHints') {
                return window.getCodeConnectHints(params.nodeIds, params.scanCurrentPage, params.maxNodes);
              }
              if (method === 'instantiateComponent') {
                return window.instantiateComponent(params.componentKey, params.options);
              }
              if (method === 'setNodeDescription') {
                return window.setNodeDescription(params.nodeId, params.description, params.descriptionMarkdown);
              }
              if (method === 'addComponentProperty') {
                return window.addComponentProperty(params.nodeId, params.propertyName, params.type, params.defaultValue, params.options);
              }
              if (method === 'editComponentProperty') {
                return window.editComponentProperty(params.nodeId, params.propertyName, params.newValue);
              }
              if (method === 'deleteComponentProperty') {
                return window.deleteComponentProperty(params.nodeId, params.propertyName);
              }
              if (method === 'resizeNode') {
                return window.resizeNode(params.nodeId, params.width, params.height, params.withConstraints);
              }
              if (method === 'moveNode') {
                return window.moveNode(params.nodeId, params.x, params.y);
              }
              if (method === 'setNodeFills') {
                return window.setNodeFills(params.nodeId, params.fills);
              }
              if (method === 'setNodeStrokes') {
                return window.setNodeStrokes(params.nodeId, params.strokes, params.strokeWeight);
              }
              if (method === 'setNodeOpacity') {
                return window.setNodeOpacity(params.nodeId, params.opacity);
              }
              if (method === 'setNodeCornerRadius') {
                return window.setNodeCornerRadius(params.nodeId, params.radius);
              }
              if (method === 'cloneNode') {
                return window.cloneNode(params.nodeId);
              }
              if (method === 'deleteNode') {
                return window.deleteNode(params.nodeId);
              }
              if (method === 'renameNode') {
                return window.renameNode(params.nodeId, params.newName);
              }
              if (method === 'setTextContent') {
                return window.setTextContent(params.nodeId, params.text, params.options);
              }
              if (method === 'createChildNode') {
                return window.createChildNode(params.parentId, params.nodeType, params.properties);
              }
              if (method === 'captureScreenshot') {
                return window.captureScreenshot(params.nodeId, params.options);
              }
              if (method === 'setInstanceProperties') {
                return window.setInstanceProperties(params.nodeId, params.properties);
              }
              if (method === 'getDocumentStructure') {
                return window.getDocumentStructure(params.depth, params.verbosity, params.includeLayout, params.includeVisual, params.includeTypography, params.includeCodeReady, params.outputHint);
              }
              if (method === 'getNodeContext') {
                return window.getNodeContext(params.nodeId, params.depth, params.verbosity, params.includeLayout, params.includeVisual, params.includeTypography, params.includeCodeReady, params.outputHint);
              }
              if (method === 'getLocalStyles') {
                return window.getLocalStyles(params.verbosity);
              }
              if (method === 'getConsoleLogs') {
                return window.getConsoleLogs(params.limit);
              }
              if (method === 'clearConsole') {
                return window.clearConsole();
              }
              if (method === 'batchCreateVariables') {
                return window.batchCreateVariables(params.items);
              }
              if (method === 'batchUpdateVariables') {
                return window.batchUpdateVariables(params.items);
              }
              if (method === 'setupDesignTokens') {
                return window.setupDesignTokens(params);
              }
              if (method === 'arrangeComponentSet') {
                return window.arrangeComponentSet(params.nodeIds);
              }
              return { success: false, error: 'Unknown method: ' + method };
            };
            var wsRef = mcpBridgeWs;
            Promise.resolve(run()).then(function(result) {
              if (wsRef && wsRef.readyState === 1) {
                try { wsRef.send(JSON.stringify({ id: id, result: result })); } catch (_) {}
              }
            }).catch(function(err) {
              if (wsRef && wsRef.readyState === 1) {
                try { wsRef.send(JSON.stringify({ id: id, error: err.message || String(err) })); } catch (_) {}
              }
            });
          } catch (e) {
            if (mcpBridgeWs && mcpBridgeWs.readyState === 1 && msg && msg.id) {
              try { mcpBridgeWs.send(JSON.stringify({ id: msg.id, error: e.message || String(e) })); } catch (_) {}
            }
          }
        };
        mcpBridgeWs.onclose = function() {
          stopKeepAlive();
          if (mcpBridgeWs !== currentWs) return;
          mcpBridgeWs = null;
          mcpConnecting = false;
          mcpConnectedPort = null;
          if (mcpHandshakeTimer) { clearTimeout(mcpHandshakeTimer); mcpHandshakeTimer = null; }
          if (autoPortProbeActive && candidatePortIndex < candidatePorts.length - 1) {
            candidatePortIndex += 1;
            updateStatus('auto-connect :' + candidatePorts[candidatePortIndex], false, false);
          } else {
            updateStatus('no server', false, true);
          }
          scheduleReconnect();
        };
        mcpBridgeWs.onerror = function() {
          mcpConnecting = false;
        };
      } catch (e) {
        mcpConnecting = false;
        updateStatus('no server', false, true);
        scheduleReconnect();
      }
    }

    if (typeof document !== 'undefined' && document.addEventListener) {
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && (!mcpBridgeWs || mcpBridgeWs.readyState > 1)) {
          mcpReconnectDelay = MCP_RECONNECT_MIN;
          connectMcpBridge();
        }
      });
    }

    if (typeof WebSocket !== 'undefined') {
      initMcpHostInput();
      initMcpPortInput();
      initTokenInput();
      initAdvancedPanel();
      try {
        var rememberedPort = parseInt(localStorage.getItem(MCP_BRIDGE_PORT_KEY) || '', 10);
        if (rememberedPort >= MCP_PORT_MIN && rememberedPort <= MCP_PORT_MAX) {
          DEFAULT_MCP_PORT = rememberedPort;
        }
      } catch (e) {}
      candidatePorts = listCandidatePorts();
      connectMcpBridge();
      requestUiResize();
    }
  </script>
</body>
</html>
